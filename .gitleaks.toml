# Gitleaks config for CheckRay.
# Extends the default ruleset and adds repo-specific allowlist entries.

[extend]
useDefault = true

[allowlist]
description = "CheckRay-specific allowlist (paths only — never allow real secrets)"
paths = [
  '''(^|/)\.env\.example$''',
  '''(^|/)pnpm-lock\.yaml$''',
  '''(^|/)package-lock\.yaml$''',
  '''(^|/)package-lock\.json$''',
  '''(^|/)node_modules/''',
  '''(^|/)\.next/''',
  '''(^|/)\.plasmo/''',
  '''(^|/)build/''',
  '''(^|/)chrome-extension/build/''',
]

# ── CI build-time stub allowlist ─────────────────────────────────────────────
# Allows literal placeholder strings used only in .github/workflows/ci.yml.
# These are NOT real credentials — they exist solely to satisfy Next.js
# build-time env requirements in CI without actual keys.
# Scoped to .github/workflows/ only — does NOT allow real secrets elsewhere.
[[rules]]
id = "ci-build-stubs"
description = "Allow known CI build-time placeholder values in workflow files"
regex = '''placeholder-build-stub|sk-placeholder'''
allowlist.paths = ['''.github/workflows/.*\.(yml|yaml)$''']
